services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      BACKEND_DATABASE_URL: postgresql+psycopg2://app:app@db:5432/urban_risk
      JWT_SECRET_KEY: change-me
      JWT_EXPIRE_MINUTES: 1440
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend

  db:
    build:
      context: .
      dockerfile: docker/db/Dockerfile
    image: urban-risk-postgis:16-3.4-local
    command:
      - postgres
      - -c
      - max_parallel_workers=0
      - -c
      - max_parallel_workers_per_gather=0
      - -c
      - statement_timeout=15000
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: urban_risk
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d urban_risk"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
