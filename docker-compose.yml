services:
  db:
    image: postgis/postgis:16-3.4
    command:
      - postgres
      - -c
      - max_parallel_workers=0
      - -c
      - max_parallel_workers_per_gather=0
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: urban_risk
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
